<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Silicon Photonics 3D Knowledge Graph</title>
    <style>
      :root {
        color-scheme: dark;
      }

      body {
        margin: 0;
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
        background: radial-gradient(circle at top, #12203a, #090c12 65%);
        overflow: hidden;
      }

      #hud {
        position: fixed;
        top: 1rem;
        left: 1rem;
        right: 1rem;
        max-width: 26rem;
        z-index: 10;
        background: rgba(12, 18, 30, 0.75);
        border: 1px solid rgba(132, 166, 255, 0.35);
        border-radius: 0.75rem;
        backdrop-filter: blur(8px);
        color: #ecf3ff;
        padding: 0.9rem 1rem;
        box-shadow: 0 15px 40px rgba(0, 0, 0, 0.35);
      }

      #hud h1 {
        margin: 0;
        font-size: 1.08rem;
      }

      #hud p {
        margin: 0.5rem 0 0;
        color: #d8e4ff;
        font-size: 0.92rem;
        line-height: 1.35;
      }

      #canvas {
        width: 100vw;
        height: 100vh;
        display: block;
      }

      #legend {
        position: fixed;
        bottom: 1rem;
        left: 1rem;
        z-index: 10;
        background: rgba(8, 12, 20, 0.75);
        border: 1px solid rgba(122, 148, 214, 0.35);
        border-radius: 0.6rem;
        padding: 0.6rem 0.7rem;
        color: #d8e4ff;
        font-size: 0.82rem;
      }

      .key {
        display: inline-flex;
        align-items: center;
        margin: 0.1rem 0.5rem 0.1rem 0;
      }

      .dot {
        width: 0.65rem;
        height: 0.65rem;
        border-radius: 999px;
        margin-right: 0.35rem;
      }
    </style>
  </head>
  <body>
    <section id="hud">
      <h1>Silicon Photonics 3D Knowledge Graph</h1>
      <p id="detail">
        Drag to orbit, scroll to zoom, and click a node to pin its description.
      </p>
    </section>

    <section id="legend">
      <span class="key"><span class="dot" style="background:#78b9ff"></span>Devices</span>
      <span class="key"><span class="dot" style="background:#ff9d66"></span>Materials</span>
      <span class="key"><span class="dot" style="background:#9cff8e"></span>Fabrication</span>
      <span class="key"><span class="dot" style="background:#d6a4ff"></span>Systems</span>
    </section>

    <canvas id="canvas"></canvas>

    <script type="module" src="src/main.js"></script>
  </body>
</html>
